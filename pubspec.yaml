name: music_room_app
description: A new Flutter project for managing music rooms.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.2
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  go_router: ^17.2.3
  flutter_riverpod: ^3.3.1
  cached_network_image: ^3.3.0
  url_launcher: ^6.2.1
  intl: ^0.20.2
  flutter_local_notifications: ^21.0.0
  firebase_storage: ^13.4.1
  image_picker: ^1.1.2
  fl_chart: ^0.70.2
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard-Regular.otf
        - asset: assets/fonts/Pretendard-Bold.otf
          weight: 700
