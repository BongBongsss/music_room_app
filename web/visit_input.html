<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background: #2f2f2f;
      overflow: hidden;
    }

    input {
      width: 100%;
      height: 100%;
      border: none;
      outline: none;
      background: #2f2f2f;
      color: #ffffff;
      -webkit-text-fill-color: #ffffff;
      box-sizing: border-box;
      font-size: 16px;
      line-height: 22px;
      font-weight: 500;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
      padding: 7px 4px;
      margin: 0;
      appearance: none;
      -webkit-appearance: none;
      -webkit-font-smoothing: antialiased;
      transform: translateZ(0);
    }

    input::placeholder {
      color: #f3f4f6;
      -webkit-text-fill-color: #f3f4f6;
      opacity: 1;
    }

    input:focus {
      background: #2f2f2f;
      color: #ffffff;
      -webkit-text-fill-color: #ffffff;
    }
  </style>
</head>
<body>
  <input
    id="nameInput"
    type="text"
    lang="ko"
    inputmode="text"
    autocomplete="name"
    autocapitalize="off"
    autocorrect="off"
    spellcheck="false"
    placeholder="성함"
  >
  <script>
    const input = document.getElementById('nameInput');

    input.addEventListener('input', () => {
      window.parent.postMessage({
        type: 'visitNameChanged',
        value: input.value
      }, '*');
    });

    window.addEventListener('message', (event) => {
      const data = event.data;
      if (!data || data.type !== 'setVisitName') return;
      if (input.value !== data.value) {
        input.value = data.value || '';
      }
    });
  </script>
</body>
</html>
